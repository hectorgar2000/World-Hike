<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>World Hike</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <!-- ── Setup Screen ── -->
  <div id="screen-setup" class="screen active">
    <div class="setup-card">
      <div class="setup-logo">
        <span class="logo-icon">🥾</span>
        <h1>World Hike</h1>
        <p>Camina de verdad. Explora el mundo.</p>
      </div>

      <div class="field">
        <label for="input-apikey">Google Maps API Key</label>
        <input type="text" id="input-apikey" placeholder="AIza..." autocomplete="off" spellcheck="false">
        <small>Guardada solo en tu dispositivo. Activa Directions API y Elevation API en Google Cloud.</small>
      </div>

      <div class="field">
        <label for="input-start">Punto de partida</label>
        <input type="text" id="input-start" placeholder="ej: Santiago de Compostela, España">
      </div>

      <div class="field">
        <label for="input-end">Destino</label>
        <input type="text" id="input-end" placeholder="ej: Lisboa, Portugal">
      </div>

      <button id="btn-calculate" class="btn-primary">Calcular ruta →</button>

      <div id="setup-status" class="status-msg hidden"></div>
    </div>
  </div>

  <!-- ── Hike Screen ── -->
  <div id="screen-hike" class="screen">

    <header class="hike-header">
      <button id="btn-back" class="btn-icon" title="Nueva ruta">‹</button>
      <div class="route-label">
        <span id="label-start">—</span>
        <span class="arrow">→</span>
        <span id="label-end">—</span>
      </div>
      <div class="header-dist">
        <span id="stat-progress-km">0.0</span>
        <span class="unit"> / </span>
        <span id="stat-total-km">—</span>
        <span class="unit"> km</span>
      </div>
    </header>

    <!-- Terrain Canvas -->
    <div class="terrain-wrap">
      <canvas id="canvas-terrain"></canvas>
      <div class="terrain-overlay">
        <div id="badge-elevation" class="badge">— m</div>
        <div id="badge-biome" class="badge badge-biome">—</div>
      </div>
      <div id="scroll-hint" class="scroll-hint">← Arrastra para ver el camino recorrido</div>
    </div>

    <!-- Progress bar -->
    <div class="progress-track">
      <div id="progress-fill" class="progress-fill" style="width:0%"></div>
    </div>

    <!-- Stats + Input -->
    <div class="bottom-panel">
      <div class="stats-row">
        <div class="stat-block">
          <div class="stat-num" id="stat-steps">0</div>
          <div class="stat-lbl">pasos</div>
        </div>
        <div class="stat-block">
          <div class="stat-num" id="stat-km-done">0.0</div>
          <div class="stat-lbl">km hechos</div>
        </div>
        <div class="stat-block">
          <div class="stat-num" id="stat-km-left">—</div>
          <div class="stat-lbl">km restantes</div>
        </div>
        <div class="stat-block">
          <div class="stat-num" id="stat-elev-gain">0</div>
          <div class="stat-lbl">m subidos</div>
        </div>
      </div>

      <div class="input-row">
        <input type="number" id="input-steps-add" class="steps-input"
               placeholder="Añadir pasos de hoy" min="0" step="100">
        <button id="btn-add-steps" class="btn-primary">+</button>
      </div>

      <div class="import-row">
        <label class="btn-secondary" for="input-health-file">
          📥 Importar Apple Health XML
        </label>
        <input type="file" id="input-health-file" accept=".xml" style="display:none">
        <span id="import-status" class="import-status"></span>
      </div>
    </div>

  </div>

  <script type="module" src="assets/js/main.js"></script>
</body>
</html>
